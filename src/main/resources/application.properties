spring.application.name=backend-app

# Pegar la URL de conexión que te dio Neon (Asegúrate de que termine en ?sslmode=require)
spring.datasource.url=jdbc:postgresql://ep-proud-bonus-avihkpya-pooler.c-11.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=${NEON_DB_USER}
spring.datasource.password=${NEON_DB_PASSWORD}

# La magia de Hibernate: Crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 1. Pasamos nuestra llave de Groq (se cargará desde las variables de entorno)
spring.ai.openai.api-key=${GROQ_API_KEY}

# 2. EL TRUCO: Cambiamos la URL base hacia los servidores de Groq
spring.ai.openai.base-url=https://api.groq.com/openai

# 3. Elegimos el modelo de Meta (Llama 3) que ofrece Groq gratis
spring.ai.openai.chat.options.model=llama-3.1-8b-instant